name: Multicolumns
preview: fields
preview: multicolumns
wysiwyg: true

fields:
  # container:
  #   label: Container type
  #   type: select
  #   default: container
  #   options:
  #     container: Fixed width (container)
  #     container-fluid: Full width (container-fluid)

  # gutter:
  #   label: Gutter
  #   type: select
  #   default: normal
  #   options:
  #     normal: Normal
  #     no-gutters: No gutters

  columns:
    label: Columns
    type: structure
    sortable: true
    columns:
      width:
        width: 1/3
      labelforpanel:
        width: 2/3
    fields:
      labelforpanel:
        label: Column label (Panel only)
        type: text
        width: 1/2
      width:
        label: Column width (Bootstrap grid)
        type: select
        default: "12"
        options:
          "12": 12 / 12
          "9": 9 / 12
          "8": 8 / 12
          "6": 6 / 12
          "4": 4 / 12
          "3": 3 / 12
          "2": 2 / 12
        width: 1/2
      blocks:
        type: blocks
        fieldsets:
          - textnested
          - space
          - image
          - imagenested